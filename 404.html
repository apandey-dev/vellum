<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vellum | Access Restricted</title>
    <script src="/js/route-guard.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(var(--grid-color) 1px, transparent 1px);
            background-size: 24px 24px;
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        .error-wrapper {
            position: relative;
            width: 90%;
            max-width: 500px;
            perspective: 1000px;
        }
        .error-container {
            background: var(--bg-glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 80px 48px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.12);
            text-align: center;
            animation: containerIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }
        @keyframes containerIn {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .error-badge {
            display: inline-block;
            background: rgba(0, 0, 0, 0.05);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        [data-theme="dark"] .error-badge {
            background: rgba(255, 255, 255, 0.05);
        }
        .error-logo {
            width: 72px;
            height: 72px;
            background: var(--text-primary);
            color: var(--bg-canvas);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 40px auto;
            font-size: 36px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        .error-logo:hover {
            transform: translateY(-4px) rotate(5deg);
        }
        .error-logo svg {
            width: 40px;
            height: 40px;
            fill: currentColor;
        }
        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
            letter-spacing: -0.03em;
            line-height: 1.2;
        }
        .message {
            color: var(--text-primary);
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .subtext {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 48px;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }
        .actions {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .dashboard-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--text-primary);
            color: var(--bg-canvas);
            padding: 16px 32px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: none;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }
        .dashboard-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
            opacity: 0.95;
        }
        .secondary-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .secondary-btn:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="error-wrapper">
        <div class="error-container">
            <div class="error-badge">404 Error</div>
            <div class="error-logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" aria-hidden="true">
                    <path d="m438-413 212-212-43-42-169.33 170L353-582l-43 42 128 127ZM40-120v-60h880v60H40Zm100-120q-24 0-42-18t-18-42v-480q0-24 18-42t42-18h680q24 0 42 18t18 42v480q0 24-18 42t-42 18H140Zm0-60h680v-480H140v480Zm0 0v-480 480Z" />
                </svg>
            </div>
            <h1>Direct Access Not Allowed</h1>
            <p class="message">This route cannot be accessed directly.</p>
            <p class="subtext">Please use the official navigation links to access the platform.</p>
            <div class="actions">
                <a href="/dashboard" class="dashboard-btn">
                    <i class="fas fa-home"></i> Go to Dashboard
                </a>
                <a href="/login" class="secondary-btn">Sign in to your account</a>
            </div>
        </div>
    </div>
    <script>
        // Ensure theme is applied
        const savedTheme = localStorage.getItem('vellum_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>
</html>
