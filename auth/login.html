<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vellum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/styles.css">
    <script src="/js/route-guard.js"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(var(--grid-color) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .auth-container {
            background: var(--bg-glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .auth-container h2 {
            font-size: 28px;
            margin-bottom: 30px;
            color: var(--text-primary);
        }
        .auth-form .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .auth-form input {
            font-family: 'Fredoka', sans-serif;
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--accent-color);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .auth-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        .auth-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .auth-footer {
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .auth-footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>Welcome Back</h2>
        <form class="auth-form" id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="auth-btn" id="loginBtn">Login</button>
        </form>
        <div class="auth-footer">
            Don't have an account? <a href="/signup">Sign Up</a>
        </div>
    </div>
    <script type="module">
        import { supabase } from '/js/supabase-client.js';
        import { showToast } from '/js/utils.js';

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';

            const { data, error } = await supabase.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                showToast(error.message, 'error');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            } else {
                // Store session info in sessionStorage as requested
                sessionStorage.setItem('vellum_session', JSON.stringify(data.session));
                sessionStorage.setItem('vellum_login_time', Date.now());

                // Store user info in localStorage for display (name/email)
                localStorage.setItem('vellum_user', JSON.stringify({
                    name: data.user.email.split('@')[0],
                    email: data.user.email,
                    id: data.user.id
                }));

                showToast('Login successful!', 'success');
                setTimeout(() => {
                    window.location.href = '/dashboard';
                }, 1000);
            }
        });

        // Load theme
        const savedTheme = localStorage.getItem('vellum_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>
</html>
