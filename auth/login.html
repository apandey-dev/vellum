<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Vellum</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="/js/route-guard.js"></script>
    <style>
        body { font-family: 'Fredoka', sans-serif !important; }
        * { font-family: 'Fredoka', sans-serif !important; }
    </style>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <svg class="auth-logo" width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="24" height="24" rx="6" fill="#111111"/>
                    <path d="M7 8H17" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    <path d="M7 12H17" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    <path d="M7 16H13" stroke="white" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <h1>Welcome Back</h1>
                <p>Log in to your Vellum account</p>
            </div>
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" placeholder="name@company.com" required autocomplete="email">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>
                <div id="error-message" class="auth-error" style="display: none;"></div>
                <button type="submit" id="submit-btn" class="auth-btn">
                    <span>Log In</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
            <div class="auth-footer">
                <p>New to Vellum? <a href="/signup">Create an account</a></p>
            </div>
        </div>
    </div>
    <script type="module">
        import { supabase } from '/js/supabase-client.js';
        import { showToast } from '/js/utils.js';

        const loginForm = document.getElementById('login-form');
        const btn = document.getElementById('submit-btn');
        const errEl = document.getElementById('error-message');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            errEl.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<span>Verifying...</span><i class="fa-solid fa-spinner fa-spin"></i>';

            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });

                if (error) throw error;

                if (data.session) {
                    sessionStorage.setItem('vellum_session', JSON.stringify(data.session));
                    sessionStorage.setItem('vellum_login_time', Date.now().toString());
                }

                showToast('Welcome back!', 'success');
                setTimeout(() => window.location.href = '/dashboard', 800);

            } catch (err) {
                console.error('Login error:', err);
                let msg = err.message || 'Failed to connect. Please check your internet.';
                if (msg.includes('fetch')) msg = 'Network error: Could not reach Supabase.';

                errEl.textContent = msg;
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<span>Log In</span><i class="fa-solid fa-arrow-right"></i>';
            }
        });
    </script>
</body>
</html>
