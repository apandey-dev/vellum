<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Vellum</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="/js/route-guard.js"></script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="/assets/logo.svg" alt="Vellum Logo" class="auth-logo">
                <h1>Welcome Back</h1>
                <p>Log in to your Vellum account</p>
            </div>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="email" placeholder="email@example.com" required autocomplete="email">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>

                <div id="error-message" class="auth-error" style="display: none;"></div>

                <button type="submit" id="submit-btn" class="auth-btn">
                    <span>Log In</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="/signup">Sign up for free</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from '/js/supabase-client.js';
        import { showToast } from '/js/utils.js';

        const loginForm = document.getElementById('login-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorMessage = document.getElementById('error-message');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Reset UI
            errorMessage.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span>Logging in...</span><i class="fa-solid fa-spinner fa-spin"></i>';

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;

                if (data.session) {
                    // Store session in sessionStorage
                    sessionStorage.setItem('vellum_session', JSON.stringify(data.session));
                    sessionStorage.setItem('vellum_login_time', Date.now().toString());

                    showToast('Login successful!', 'success');

                    // Small delay for toast visibility
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 500);
                } else {
                    throw new Error('No session created. Please check your credentials.');
                }

            } catch (err) {
                console.error('Login error:', err.message);
                errorMessage.textContent = err.message || 'An error occurred during login.';
                errorMessage.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Log In</span><i class="fa-solid fa-arrow-right"></i>';
            }
        });
    </script>
</body>
</html>
