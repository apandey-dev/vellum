<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vellum GitHub Sync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/styles/main.css">
    <script src="/js/route-guard.js"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(var(--grid-color) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .auth-container {
            background: var(--bg-glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .auth-container h2 {
            font-size: 28px;
            margin-bottom: 30px;
            color: var(--text-primary);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: #24292e;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            transition: all 0.2s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .auth-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .auth-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .dev-token-container {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            text-align: left;
        }

        .dev-token-container label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: block;
        }

        .dev-token-container input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-canvas);
            color: var(--text-primary);
            font-family: monospace;
            margin-bottom: 10px;
        }

        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-canvas);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #loadingOverlay.visible {
            display: flex;
        }

        .spinner {
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <h3 style="margin-top: 20px;">Authenticating with GitHub...</h3>
    </div>

    <div class="auth-container" id="loginBox">
        <h2>Vellum Notes</h2>
        <p style="color: var(--text-secondary); margin-bottom: 30px;">Authenticate with GitHub to sync your notes to a
            private repository.</p>

        <button class="auth-btn" id="githubLoginBtn">
            <i class="fab fa-github" style="font-size: 20px;"></i> Login with GitHub
        </button>

        <div class="dev-token-container">
            <label>Developer: Provide Fine-Grained PAT</label>
            <input type="password" id="devToken" placeholder="github_pat_...">
            <button class="auth-btn" id="devLoginBtn" style="background: var(--accent-color);">Direct Login</button>
        </div>
    </div>

    <script type="module">
        import { showToast } from '/utils/helpers.js';

        const githubLoginBtn = document.getElementById('githubLoginBtn');
        const devLoginBtn = document.getElementById('devLoginBtn');
        const devTokenInput = document.getElementById('devToken');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loginBox = document.getElementById('loginBox');

        // redirect_uri must match the Authorization Callback URL set in GitHub OAuth App settings.
        // We always redirect back to /login so handleCallback() below can read the ?code parameter.
        const GITHUB_CLIENT_ID = 'Ov23lizAtG75frAflvAz';
        const REDIRECT_URI = encodeURIComponent(window.location.origin + '/login');
        const OAUTH_URL = `https://github.com/login/oauth/authorize?client_id=${GITHUB_CLIENT_ID}&scope=repo%20gist&redirect_uri=${REDIRECT_URI}`;
        githubLoginBtn.addEventListener('click', () => {
            if (GITHUB_CLIENT_ID === 'PLEASE_SET_ME') {
                showToast('GitHub OAuth App Client ID is not configured.', 'error');
                return;
            }
            window.location.href = OAUTH_URL;
        });

        devLoginBtn.addEventListener('click', () => {
            const token = devTokenInput.value.trim();
            if (!token) {
                showToast('Please enter a valid PAT', 'error');
                return;
            }
            sessionStorage.setItem('github_token', token);
            window.location.href = '/dashboard';
        });

        // Human-readable messages for known GitHub OAuth error codes
        const OAUTH_ERRORS = {
            'bad_verification_code': 'This login session expired. Please click "Login with GitHub" again.',
            'incorrect_client_credentials': 'OAuth app credentials are misconfigured. Contact support.',
            'redirect_uri_mismatch': 'Redirect URL mismatch. Check GitHub OAuth App settings.',
            'access_denied': 'You cancelled the GitHub authorization. Please try again.',
        };

        // Handle OAuth callback — runs on every page load, exits early if no ?code present
        async function handleCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const errorParam = params.get('error');

            if (errorParam) {
                const msg = OAUTH_ERRORS[errorParam] || `Authentication failed: ${errorParam}`;
                showToast(msg, 'error');
                return;
            }

            if (!code) return; // Normal login page load — no callback to process

            console.debug('[OAuth] Code received from GitHub.');
            loginBox.style.display = 'none';
            loadingOverlay.classList.add('visible');

            try {
                console.debug('[OAuth] Sending code to /api/oauth...');
                const response = await fetch('/api/oauth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });

                let data;
                try {
                    data = await response.json();
                } catch {
                    throw new Error('Authentication server returned an unexpected response. Please try again.');
                }

                console.debug('[OAuth] Server response received:', { ok: response.ok, hasToken: !!data.access_token, error: data.error || null });

                // GitHub returns error fields even on HTTP 200 when the code is bad/expired
                if (data.error) {
                    const msg = OAUTH_ERRORS[data.error] || (data.error_description || data.error);
                    throw new Error(msg);
                }

                if (!response.ok) {
                    throw new Error(`Server error (${response.status}). Please try again.`);
                }

                if (!data.access_token) {
                    throw new Error('No access token returned. Check that GITHUB_CLIENT_SECRET is set correctly in Vercel environment variables.');
                }

                // ✅ Token exchange succeeded
                sessionStorage.setItem('github_token', data.access_token);
                console.debug('[OAuth] Token stored in sessionStorage. Redirecting to /dashboard...');

                // Remove ?code from URL before navigating away
                window.history.replaceState({}, document.title, '/login');
                window.location.href = '/dashboard';

            } catch (error) {
                console.error('[OAuth] Token exchange failed:', error.message);
                loadingOverlay.classList.remove('visible');
                loginBox.style.display = 'block';
                showToast(error.message, 'error');
            }
        }


        handleCallback();

        // Load theme
        const savedTheme = localStorage.getItem('vellum_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>

</html>
