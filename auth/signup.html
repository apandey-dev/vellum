<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Vellum</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="/js/route-guard.js"></script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="/assets/logo.svg" alt="Vellum Logo" class="auth-logo">
                <h1>Create Account</h1>
                <p>Start your minimal writing journey today</p>
            </div>

            <form id="signup-form" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="email" placeholder="email@example.com" required autocomplete="email">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-lock"></i>
                        <input type="password" id="password" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password">
                    </div>
                </div>

                <div id="error-message" class="auth-error" style="display: none;"></div>

                <button type="submit" id="submit-btn" class="auth-btn">
                    <span>Create Account</span>
                    <i class="fa-solid fa-user-plus"></i>
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="/login">Log in here</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from '/js/supabase-client.js';
        import { showToast } from '/js/utils.js';

        const signupForm = document.getElementById('signup-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorMessage = document.getElementById('error-message');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Reset UI
            errorMessage.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span>Creating account...</span><i class="fa-solid fa-spinner fa-spin"></i>';

            try {
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password
                });

                if (error) throw error;

                if (data.session) {
                    // Auto-logged in
                    sessionStorage.setItem('vellum_session', JSON.stringify(data.session));
                    sessionStorage.setItem('vellum_login_time', Date.now().toString());

                    showToast('Account created successfully!', 'success');

                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 500);
                } else if (data.user) {
                    // Confirmation email sent
                    showToast('Check your email for a confirmation link!', 'info');
                    submitBtn.innerHTML = '<span>Check Email</span><i class="fa-solid fa-envelope-circle-check"></i>';
                }

            } catch (err) {
                console.error('Signup error:', err.message);
                errorMessage.textContent = err.message || 'An error occurred during signup.';
                errorMessage.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Create Account</span><i class="fa-solid fa-user-plus"></i>';
            }
        });
    </script>
</body>
</html>
