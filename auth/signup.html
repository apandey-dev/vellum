<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Vellum</title>
    <link rel="stylesheet" href="/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="/js/route-guard.js"></script>
    <script src="/js/auth-guard.js"></script>
    <style>
        body { font-family: 'Fredoka', sans-serif !important; }
        * { font-family: 'Fredoka', sans-serif !important; }
    </style>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join Vellum and start writing beautifully.</p>
            </div>
            <form id="signup-form" class="auth-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper no-icon">
                        <input type="email" id="email" placeholder="name@company.com" required autocomplete="email">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper no-icon">
                        <input type="password" id="password" placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password">
                    </div>
                </div>
                <div id="error-message" class="auth-error" style="display: none;"></div>
                <button type="submit" id="submit-btn" class="auth-btn">
                    <span>Get Started</span>
                </button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="/login">Log in here</a></p>
            </div>
        </div>
    </div>
    <script type="module">
        import { auth } from '/js/auth.js';
        import { showToast } from '/js/utils.js';

        const signupForm = document.getElementById('signup-form');
        const btn = document.getElementById('submit-btn');
        const errEl = document.getElementById('error-message');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            errEl.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<span>Creating Account...</span>';

            try {
                await auth.signup(email, password);
                showToast('Account created successfully!', 'success');
                setTimeout(() => window.location.href = '/dashboard', 800);
            } catch (err) {
                console.error('Signup error:', err);
                errEl.textContent = err.message || 'An unexpected error occurred.';
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<span>Get Started</span>';
            }
        });
    </script>
</body>
</html>
