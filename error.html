<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vellum — Direct Access Not Allowed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-canvas: #f2f4f7;
            --text-primary: #111111;
            --border-color: #eaecf0;
            --accent-color: #000000;
        }
        [data-theme="dark"] {
            --bg-canvas: #09090b;
            --text-primary: #FFFFFF;
            --border-color: #2a2a2a;
            --accent-color: #3b82f6;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-canvas);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .error-container {
            padding: 40px;
            max-width: 480px;
        }
        .error-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
        }
        [data-theme="dark"] .error-logo {
            filter: invert(1);
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        p {
            font-size: 16px;
            opacity: 0.7;
            line-height: 1.5;
            margin-bottom: 32px;
        }
        .home-btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: var(--text-primary);
            color: var(--bg-canvas);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .home-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <img src="/assets/logo.svg" alt="Vellum Logo" class="error-logo">
        <h1>Direct access is not allowed.</h1>
        <p>The page you are looking for cannot be accessed directly or does not exist.</p>
        <a href="/" class="home-btn">Go Back to Home</a>
    </div>
    <script>
        const savedTheme = localStorage.getItem('vellum_theme') || localStorage.getItem('focuspad_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>
</html>
