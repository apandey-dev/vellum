<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vellum | Minimal Markdown Editor</title>
    <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjQiIGhlaWdodD0iMjQiIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cGF0aCBkPSJNNSAzQzMuODk1NDMgMyAzIDMuODk1NDMgMyA1VjE5QzMwMjAuMTA0NiAzIDIwLjEwNDYgMjEgMTlWNUMyMSAzLjg5NTQzIDIwLjEwNDYgMyAxOSAzSDVaIiBmaWxsPSIjM0I4MkY2Ii8+PHBhdGggZD0iTTcgOEgxNyIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIxLjUiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIvPjxwYXRoIGQ9Ik03IDEySDE3IiBzdHJva2U9IndoaXRlIiBzdHJva2Utd2lkdGg9IjEuNSIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIi8+PHBhdGggZD0iTTcgMTZIMTMiIHN0cm9rZT0id2hpdGUiIHN0cm9rZS13aWR0aD0iMS41IiBzdHJva2UtbGluZWNhcD0icm91bmQiLz48Y2lyY2xlIGN4PSIxOC41IiBjeT0iMTQuNSIgcj0iMS41IiBmaWxsPSJ3aGl0ZSIvPjwvc3ZnPg==" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&family=Kalam:wght@300;400;700&family=Playpen+Sans:wght@100;200;300;400;500;600;700;800&family=Patrick+Hand&family=Baloo+2:wght@400;500;600;700;800&family=Comic+Neue:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">

    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-light">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-dark" disabled>

    <script src="/js/route-guard.js"></script>
    <script src="/js/auth-guard.js"></script>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('vellum_theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <div class="brand-text">V</div>
        </div>
        <div class="tool-group">
            <div class="tool-btn" id="searchBtn" data-tooltip="Search">S</div>
            <div class="tool-btn" id="exportBtn" data-tooltip="Export">E</div>
            <div class="tool-btn" id="shareBtn" data-tooltip="Share">H</div>
            <div class="tool-btn" id="deleteBtn" data-tooltip="Delete">D</div>
            <div class="divider"></div>
            <div class="tool-btn active" id="editorOnlyBtn" data-tooltip="Editor Only">W</div>
            <div class="tool-btn" id="splitViewBtn" data-tooltip="Split View">B</div>
            <div class="tool-btn" id="previewOnlyBtn" data-tooltip="Preview Only">V</div>
            <div class="divider"></div>
        </div>
        <div class="bottom-actions">
            <div class="tool-btn" id="themeToggle" data-tooltip="Theme">M</div>
            <div class="tool-btn" id="focusBtn" data-tooltip="Zen">Z</div>
            <div class="tool-btn" id="userProfileBtn" data-tooltip="User">U</div>
        </div>
    </nav>

    <div class="top-bar-wrapper" id="topBar">
        <header class="glass-header">
            <div class="chips" id="noteChips"></div>
            <div class="header-actions">
                <div class="font-selector-wrapper">
                    <button class="font-selector-btn" id="fontSelectorBtn">
                        <span class="current-font-preview" id="currentFont">Fredoka</span>
                    </button>
                    <div class="font-dropdown" id="fontDropdown">
                        <div class="font-option active" data-font="Fredoka"><span>Fredoka</span></div>
                        <div class="font-option" data-font="Kalam"><span>Kalam</span></div>
                        <div class="font-option" data-font="Playpen Sans"><span>Playpen Sans</span></div>
                        <div class="font-option" data-font="Patrick Hand"><span>Patrick Hand</span></div>
                        <div class="font-option" data-font="Baloo 2"><span>Baloo 2</span></div>
                        <div class="font-option" data-font="Comic Neue"><span>Comic Neue</span></div>
                        <div class="font-option" data-font="Comic Sans MS"><span>Comic Sans MS</span></div>
                    </div>
                </div>
                <button class="action-btn" id="addNoteBtn" title="New Note">New</button>
                <button class="action-btn" id="pinBtn" title="Pin">Pin</button>
                <button class="action-btn" id="manageFoldersBtn" title="Manage Folders">Folders</button>
            </div>
        </header>
    </div>

    <main class="workspace">
        <div class="editor-split-container" id="editorContainer">
            <div class="editor-pane" id="editorPane">
                <textarea class="writing-canvas" id="writingCanvas" placeholder="Start typing markdown here..."></textarea>
            </div>
            <div class="resizer" id="resizer"><div class="resizer-handle"></div></div>
            <div class="preview-pane" id="previewPane">
                <div class="preview-canvas markdown-body" id="previewCanvas"></div>
            </div>
        </div>
        <div id="emptyState" class="empty-folder-message hidden">
            <h3>No notes yet</h3>
            <p>Create your first note to get started.</p>
            <button class="create-note-btn" id="createNoteFromEmpty">Create New Note</button>
        </div>
    </main>

    <div class="restore-pill" id="restoreBtn"><span>Exit Focus</span></div>
    <div class="context-menu" id="noteContextMenu">
        <div class="context-menu-item" id="ctxRename">Rename</div>
        <div class="context-menu-item" id="ctxPin">Pin Note</div>
        <div class="divider-h"></div>
        <div class="context-menu-item" id="moveToFolderItem">Move to...</div>
        <div class="divider-h"></div>
        <div class="context-menu-item delete-item" id="ctxDelete">Delete</div>
    </div>
    <div id="modal-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script type="module" src="/js/core.js"></script>
    <script type="module" src="/js/app-editor.js"></script>
</body>
</html>
