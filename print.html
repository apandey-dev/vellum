<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Preview - Vellum</title>
    <!-- Import Fonts to match Editor -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&family=Kalam:wght@300;400;700&family=Playpen+Sans:wght@100..800&family=Patrick+Hand&family=Baloo+2:wght@400..800&family=Comic+Neue:wght@300;400;700&display=swap"
        rel="stylesheet">
    <script src="/js/route-guard.js"></script>
    <script src="/js/auth-guard.js"></script>

    <!-- Markdown Rendering & Security Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>

    <!-- Code Highlight Themes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-light" disabled>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-dark" disabled>

    <style>
        /* --- GLOBAL RESET --- */
        * {
            box-sizing: border-box;
            scrollbar-width: none;
            user-select: none;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            /* Main scroll is on #preview-container unless infinity mode overrides */
        }

        body {
            background-color: #e0e0e0;
            /* Gray App Background */
            font-family: 'Fredoka', sans-serif;
            display: flex;
            /* Sidebar | Preview */
            align-items: flex-start;
            /* CRITICAL: Aligns children to top */
        }

        /* --- VARIABLES --- */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --page-width: 210mm;
            /* A4 Default */
            --page-height: 297mm;
            --sidebar-width: 260px;
            --sidebar-bg: #f5f5f5;
            --sidebar-text: #333;
            --accent-color: #000;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --sidebar-bg: #111;
            --sidebar-text: #ccc;
            --accent-color: #fff;
        }

        /* --- SETTINGS SIDEBAR --- */
        #settings-sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
            overflow-y: auto;
            flex-shrink: 0;
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }

        h3 {
            margin: 10px 0 5px 0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-row {
            display: flex;
            gap: 10px;
        }

        .control-row .control-group {
            flex: 1;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
        }

        select,
        button,
        input {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-family: inherit;
            cursor: pointer;
            width: 100%;
        }

        input {
            cursor: text;
        }

        button.primary {
            background-color: var(--accent-color);
            color: var(--sidebar-bg);
            border: none;
            font-weight: 600;
            margin-top: 20px;
            padding: 12px;
        }

        button.secondary {
            background-color: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
        }

        /* --- PREVIEW AREA --- */
        #preview-container {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            /* STRICT BLOCK LAYOUT - NO FLEX VERTICAL CENTERING */
            display: block;
            padding: 40px;
            /* Gray space around paper */
            background-color: #555;
            position: relative;
        }

        /* THE PHYSICAL PAPER */
        #page-sheet {
            background-color: var(--bg-color);
            width: var(--page-width);
            min-height: var(--page-height);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            /* Center Horizontally Only */
            margin: 0 auto;
            padding: 0;
            position: relative;
        }

        /* THE CONTENT CONTAINER */
        #editor-print-container {
            width: 100%;
            height: 100%;
            background-color: transparent;
            color: var(--text-color);
            line-height: 1.6;
            font-size: 12pt;
            word-wrap: break-word;
            overflow: hidden;
            display: flow-root;
            padding: 40px;
        }

        /* --- MARKDOWN STYLES FOR PRINT CONSISTENCY --- */
        .markdown-body h1, .markdown-body h2, .markdown-body h3,
        .markdown-body h4, .markdown-body h5, .markdown-body h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
            color: var(--text-color);
        }

        .markdown-body h1 { font-size: 2em; border-bottom: 1px solid #eee; padding-bottom: 0.3em; }
        .markdown-body h2 { font-size: 1.5em; border-bottom: 1px solid #eee; padding-bottom: 0.3em; }
        .markdown-body h3 { font-size: 1.25em; }

        .markdown-body p { margin-bottom: 16px; }
        .markdown-body strong { font-weight: 600; }
        .markdown-body em { font-style: italic; }

        .markdown-body blockquote {
            padding: 0 1em;
            color: #666;
            border-left: 0.25em solid var(--accent-color);
            margin: 0 0 16px 0;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 4px;
        }

        .markdown-body ul, .markdown-body ol {
            padding-left: 2em;
            margin-bottom: 16px;
        }

        .markdown-body code {
            padding: 0.2em 0.4em;
            font-size: 85%;
            background-color: rgba(0, 0, 0, 0.05);
            border-radius: 6px;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        .markdown-body pre {
            padding: 16px;
            overflow: auto;
            font-size: 85%;
            line-height: 1.45;
            background-color: #f6f8fa;
            border-radius: 10px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
        }

        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
            font-size: 100%;
            border-radius: 0;
        }

        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 16px;
        }

        .markdown-body table th, .markdown-body table td {
            padding: 6px 13px;
            border: 1px solid #ddd;
        }

        .markdown-body hr {
            height: 2px;
            background: #eee;
            border: none;
            margin: 24px 0;
        }

        /* Page break control */
        .markdown-body pre,
        .markdown-body blockquote,
        .markdown-body tr,
        .markdown-body img,
        .markdown-body ul,
        .markdown-body ol {
            page-break-inside: avoid;
            break-inside: avoid;
        }

        .hljs {
            display: block;
            overflow-x: auto;
            padding: 0.5em;
            background: transparent !important;
        }

        /* --- PAGE SIZE CLASSES --- */
        body.size-a4 {
            --page-width: 210mm;
            --page-height: 297mm;
        }

        body.size-a3 {
            --page-width: 297mm;
            --page-height: 420mm;
        }

        body.size-a5 {
            --page-width: 148mm;
            --page-height: 210mm;
        }

        body.size-letter {
            --page-width: 215.9mm;
            --page-height: 279.4mm;
        }

        body.size-legal {
            --page-width: 215.9mm;
            --page-height: 355.6mm;
        }

        /* INFINITY MODE OVERRIDES */
        body.size-infinity {
            --page-width: 210mm;
            --page-height: auto;
            height: auto;
            overflow: visible;
        }

        body.size-infinity #page-sheet {
            min-height: 100vh;
            height: auto;
            box-shadow: none;
            margin-bottom: 0;
        }

        /* --- PRINT MEDIA QUERIES --- */
        @media print {
            body {
                background: white !important;
                height: auto;
                overflow: visible;
                display: block;
                color: black !important;
            }

            #settings-sidebar {
                display: none !important;
            }

            #preview-container {
                padding: 0;
                margin: 0;
                background: white !important;
                display: block;
                overflow: visible;
                height: auto;
                width: 100%;
            }

            #page-sheet {
                padding: 0 !important;
                box-shadow: none;
                margin: 0;
                width: 100% !important;
                max-width: none;
                print-color-adjust: exact;
                -webkit-print-color-adjust: exact;
                height: auto;
                overflow: visible;
                background: white !important;
            }

            #editor-print-container {
                width: 100% !important;
                background: white !important;
                color: black !important;
            }

            .markdown-body pre {
                background-color: #f6f8fa !important;
                border: 1px solid #ddd !important;
                -webkit-print-color-adjust: exact;
            }

            .markdown-body blockquote {
                background: rgba(0, 0, 0, 0.05) !important;
                border-left-color: var(--accent-color) !important;
            }

            body.size-infinity #page-sheet {
                height: auto !important;
                overflow: visible !important;
            }

            /* Force color preservation */
            span[style*="color"] {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>

    <!-- Dynamic Style Injection for @page -->
    <style id="page-style-injection"></style>
</head>

<body class="size-infinity">

    <!-- Settings Sidebar -->
    <div id="settings-sidebar">
        <h2>Print Settings</h2>

        <div class="control-group">
            <label for="sizeSelect">Page Size</label>
            <select id="sizeSelect">
                <option value="size-infinity" selected>Infinity (Single Continuous Page)</option>
                <option value="size-a4">A4</option>
                <option value="size-a3">A3</option>
                <option value="size-a5">A5</option>
                <option value="size-letter">Letter</option>
                <option value="size-legal">Legal</option>
            </select>
        </div>

        <div class="control-group">
            <label for="themeSelect">Theme</label>
            <select id="themeSelect">
                <option value="light">Light (White)</option>
                <option value="dark">Dark (Black)</option>
            </select>
        </div>

        <h3>Content Padding (px)</h3>
        <div class="control-row">
            <div class="control-group">
                <label>Top</label>
                <input type="number" id="paddingTop" value="40" min="0">
            </div>
            <div class="control-group">
                <label>Bottom</label>
                <input type="number" id="paddingBottom" value="40" min="0">
            </div>
        </div>
        <div class="control-row">
            <div class="control-group">
                <label>Left</label>
                <input type="number" id="paddingLeft" value="40" min="0">
            </div>
            <div class="control-group">
                <label>Right</label>
                <input type="number" id="paddingRight" value="40" min="0">
            </div>
        </div>

        <div style="flex:1"></div> <!-- Spacer -->

        <button class="primary" id="printBtn">🖨️ Print / Save PDF</button>
        <button class="secondary" id="closeBtn">Close</button>
    </div>

    <!-- Content Preview -->
    <div id="preview-container">
        <!-- THE PAPER -->
        <div id="page-sheet">
            <!-- THE CONTENT -->
            <div id="editor-print-container" class="markdown-body">
                <p style="color: grey; text-align: center; margin-top: 50%;">Loading content...</p>
            </div>
        </div>
    </div>

    <!-- LOGIC -->
    <script type="module">
        import { MarkdownEngine } from '/js/markdown-engine.js';

        document.addEventListener('DOMContentLoaded', () => {
            const content = localStorage.getItem('vellum_print_content');
            const pageSheet = document.getElementById('page-sheet');
            const editorContainer = document.getElementById('editor-print-container');

            const sizeSelect = document.getElementById('sizeSelect');
            const themeSelect = document.getElementById('themeSelect');
            const printBtn = document.getElementById('printBtn');

            function updateHljsTheme() {
                const theme = document.documentElement.getAttribute('data-theme') || 'light';
                const lightLink = document.getElementById('hljs-light');
                const darkLink = document.getElementById('hljs-dark');

                if (theme === 'dark') {
                    lightLink.disabled = true;
                    darkLink.disabled = false;
                } else {
                    lightLink.disabled = false;
                    darkLink.disabled = true;
                }
            }
            const closeBtn = document.getElementById('closeBtn');
            const styleInjection = document.getElementById('page-style-injection');

            // Padding Inputs (px)
            const paddingInputs = {
                top: document.getElementById('paddingTop'),
                bottom: document.getElementById('paddingBottom'),
                left: document.getElementById('paddingLeft'),
                right: document.getElementById('paddingRight')
            };

            // 1. Load Content
            const title = localStorage.getItem('vellum_print_title') || 'Untitled Document';
            const currentFont = localStorage.getItem('vellum_current_font') || 'Fredoka';
            const fontMap = {
                'Fredoka': "'Fredoka', sans-serif",
                'Kalam': "'Kalam', cursive",
                'Playpen Sans': "'Playpen Sans', cursive",
                'Patrick Hand': "'Patrick Hand', cursive",
                'Baloo 2': "'Baloo 2', cursive",
                'Comic Neue': "'Comic Neue', cursive",
                'Comic Sans MS': "'Comic Sans MS', cursive, sans-serif"
            };
            editorContainer.style.fontFamily = fontMap[currentFont];

            if (content) {
                // The content from handleExport is already rendered HTML
                editorContainer.innerHTML = `<h1>${escapeHtml(title)}</h1>` + content;
                // Update window title
                document.title = `Print Preview - ${title}`;
            } else {
                editorContainer.innerHTML = '<h1 style="color:red">Error: No content found to print.</h1><p>Please go back and try exporting again.</p>';
            }

            // Helper function to escape HTML
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // 2. CSS Injector Function for Margins (@page)
            function updatePageSize() {
                const size = sizeSelect.value;
                let pageRule = '';

                if (size === 'size-infinity') {
                    // TRUE INFINITY MODE logic
                    const contentHeightPx = pageSheet.scrollHeight;
                    const heightMm = Math.ceil(contentHeightPx * 0.264583) + 20;
                    // Force margin 0 to let padding handle spacing
                    pageRule = `@page { size: 210mm ${heightMm}mm; margin: 0; }`;
                } else {
                    const sizeName = size.replace('size-', '');
                    pageRule = `@page { size: ${sizeName}; margin: 0; }`;
                }
                styleInjection.textContent = pageRule;
            }

            // 3. Padding Update Function (Pixel-based, Real-time)
            function updateContentPadding() {
                let pt = parseInt(paddingInputs.top.value) || 0;
                let pb = parseInt(paddingInputs.bottom.value) || 0;
                let pl = parseInt(paddingInputs.left.value) || 0;
                let pr = parseInt(paddingInputs.right.value) || 0;

                pt = Math.max(0, pt); pb = Math.max(0, pb); pl = Math.max(0, pl); pr = Math.max(0, pr);

                editorContainer.style.paddingTop = `${pt}px`;
                editorContainer.style.paddingBottom = `${pb}px`;
                editorContainer.style.paddingLeft = `${pl}px`;
                editorContainer.style.paddingRight = `${pr}px`;
            }

            // 4. Setup Listeners
            sizeSelect.addEventListener('change', (e) => {
                document.body.className = e.target.value;
                updatePageSize();
            });

            themeSelect.addEventListener('change', (e) => {
                const theme = e.target.value;
                document.documentElement.setAttribute('data-theme', theme);
                updateHljsTheme();
            });

            Object.values(paddingInputs).forEach(input => {
                input.addEventListener('input', updateContentPadding);
            });

            // 5. Print Action
            printBtn.addEventListener('click', () => {
                if (sizeSelect.value === 'size-infinity') {
                    updatePageSize();
                }
                window.print();
            });

            // 6. Close Action
            closeBtn.addEventListener('click', () => {
                window.close();
            });

            // Init
            updatePageSize();
            updateContentPadding();
            updateHljsTheme();
        });
    </script>
</body>

</html>
