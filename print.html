<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Preview - MindJournal</title>
    <!-- Import Fonts to match Editor -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&family=Kalam:wght@300;400;700&family=Playpen+Sans:wght@100..800&family=Patrick+Hand&family=Baloo+2:wght@400..800&family=Comic+Neue:wght@300;400;700&display=swap"
        rel="stylesheet">

    <style>
        /* --- GLOBAL RESET --- */
        * {
            box-sizing: border-box;
            scrollbar-width: none;
            user-select: none;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            /* Main scroll is on #preview-container unless infinity mode overrides */
        }

        body {
            background-color: #e0e0e0;
            /* Gray App Background */
            font-family: 'Fredoka', sans-serif;
            display: flex;
            /* Sidebar | Preview */
            align-items: flex-start;
            /* CRITICAL: Aligns children to top */
        }

        /* --- VARIABLES --- */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --page-width: 210mm;
            /* A4 Default */
            --page-height: 297mm;
            --sidebar-width: 260px;
            --sidebar-bg: #f5f5f5;
            --sidebar-text: #333;
            --accent-color: #000;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --sidebar-bg: #111;
            --sidebar-text: #ccc;
            --accent-color: #fff;
        }

        /* --- SETTINGS SIDEBAR --- */
        #settings-sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
            overflow-y: auto;
            flex-shrink: 0;
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }

        h3 {
            margin: 10px 0 5px 0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-row {
            display: flex;
            gap: 10px;
        }

        .control-row .control-group {
            flex: 1;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
        }

        select,
        button,
        input {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-family: inherit;
            cursor: pointer;
            width: 100%;
        }

        input {
            cursor: text;
        }

        button.primary {
            background-color: var(--accent-color);
            color: var(--sidebar-bg);
            border: none;
            font-weight: 600;
            margin-top: 20px;
            padding: 12px;
        }

        button.secondary {
            background-color: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
        }

        /* --- PREVIEW AREA --- */
        #preview-container {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            /* STRICT BLOCK LAYOUT - NO FLEX VERTICAL CENTERING */
            display: block;
            padding: 40px;
            /* Gray space around paper */
            background-color: #555;
            position: relative;
        }

        /* THE PHYSICAL PAPER */
        #page-sheet {
            background-color: var(--bg-color);
            width: var(--page-width);
            min-height: var(--page-height);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            /* Center Horizontally Only */
            margin: 0 auto;
            padding: 0;
            position: relative;
        }

        /* THE CONTENT CONTAINER */
        #editor-print-container {
            width: 100%;
            height: 100%;
            background-color: transparent;
            color: var(--text-color);
            /* Typography Reset */
            line-height: 1.6;
            font-size: 12pt;
            word-wrap: break-word;
            /* Structure */
            overflow: hidden;
            display: flow-root;
            padding: 40px;
            /* Default inner padding */
        }

        /* FIRST CHILD RESET - PREVENT TOP GAP */
        #editor-print-container> :first-child {
            margin-top: 0 !important;
            padding-top: 0 !important;
            page-break-before: auto !important;
            break-before: auto !important;
        }

        /* --- CONTENT STYLING --- */

        /* WHITESPACE PRESERVATION - Critical for code formatting */
        #editor-print-container {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        #editor-print-container pre,
        #editor-print-container code {
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            background: rgba(0, 0, 0, 0.05);
            padding: 2px 4px;
            border-radius: 3px;
        }

        #editor-print-container img {
            max-width: 100%;
            height: auto;
        }

        /* Headings - Match editor sizes */
        #editor-print-container h1 {
            font-size: 2em;
            margin: 0.5em 0;
            padding: 0;
        }

        #editor-print-container h2 {
            font-size: 1.5em;
            margin: 0.5em 0;
            padding: 0;
        }

        #editor-print-container h3 {
            font-size: 1.17em;
            margin: 0.5em 0;
            padding: 0;
        }

        /* Lists */
        #editor-print-container ul,
        #editor-print-container ol {
            margin-left: 20px;
        }

        /* Blockquote */
        #editor-print-container blockquote {
            border-left: 4px solid var(--accent-color);
            margin: 1em 0;
            padding-left: 15px;
            font-style: italic;
            opacity: 0.8;
        }

        /* Horizontal Rule */
        #editor-print-container hr,
        #editor-print-container .horizontal-line {
            border: none;
            border-top: 2px solid var(--accent-color);
            margin: 1.5em 0;
        }

        /* CHECKBOX / TASK ITEMS - Match editor exactly */
        #editor-print-container .task-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin: 8px 0;
            padding: 8px 0;
        }

        #editor-print-container .custom-checkbox-wrapper {
            display: inline-flex;
            align-items: center;
            position: relative;
            cursor: pointer;
            user-select: none;
        }

        #editor-print-container .custom-checkbox-wrapper input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        #editor-print-container .checkmark {
            position: relative;
            display: inline-block;
            height: 20px;
            width: 20px;
            background-color: transparent;
            border: 3px solid var(--accent-color);
            border-radius: 5px;
            transition: all 0.2s ease;
        }

        #editor-print-container .custom-checkbox-wrapper input:checked~.checkmark {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }

        #editor-print-container .checkmark:after {
            content: "";
            position: absolute;
            display: none;
            left: 5px;
            top: 1px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        #editor-print-container .custom-checkbox-wrapper input:checked~.checkmark:after {
            display: block;
        }

        #editor-print-container .task-item.completed span {
            text-decoration: line-through;
            opacity: 0.6;
        }

        #editor-print-container .task-item span {
            flex: 1;
        }

        /* Page break control */
        #editor-print-container * {
            page-break-inside: avoid;
            break-inside: avoid;
        }

        /* --- PAGE SIZE CLASSES --- */
        body.size-a4 {
            --page-width: 210mm;
            --page-height: 297mm;
        }

        body.size-a3 {
            --page-width: 297mm;
            --page-height: 420mm;
        }

        body.size-a5 {
            --page-width: 148mm;
            --page-height: 210mm;
        }

        body.size-letter {
            --page-width: 215.9mm;
            --page-height: 279.4mm;
        }

        body.size-legal {
            --page-width: 215.9mm;
            --page-height: 355.6mm;
        }

        /* INFINITY MODE OVERRIDES */
        body.size-infinity {
            --page-width: 210mm;
            --page-height: auto;
            height: auto;
            overflow: visible;
        }

        body.size-infinity #page-sheet {
            min-height: 100vh;
            height: auto;
            box-shadow: none;
            margin-bottom: 0;
        }

        /* --- PRINT MEDIA QUERIES --- */
        @media print {
            body {
                background: none;
                height: auto;
                overflow: visible;
                display: block;
            }

            #settings-sidebar {
                display: none !important;
            }

            #preview-container {
                padding: 0;
                margin: 0;
                background: none;
                display: block;
                overflow: visible;
                height: auto;
                width: 100%;
            }

            #page-sheet {
                padding: 0 !important;
                box-shadow: none;
                margin: 0;
                width: 100%;
                max-width: none;
                print-color-adjust: exact;
                -webkit-print-color-adjust: exact;
                height: auto;
                overflow: visible;
            }

            #editor-print-container {
                width: 100%;
            }

            body.size-infinity #page-sheet {
                height: auto !important;
                overflow: visible !important;
            }
        }
    </style>

    <!-- Dynamic Style Injection for @page -->
    <style id="page-style-injection"></style>
</head>

<body class="size-infinity">

    <!-- Settings Sidebar -->
    <div id="settings-sidebar">
        <h2>Print Settings</h2>

        <div class="control-group">
            <label for="sizeSelect">Page Size</label>
            <select id="sizeSelect">
                <option value="size-infinity" selected>Infinity (Single Continuous Page)</option>
                <option value="size-a4">A4</option>
                <option value="size-a3">A3</option>
                <option value="size-a5">A5</option>
                <option value="size-letter">Letter</option>
                <option value="size-legal">Legal</option>
            </select>
        </div>

        <div class="control-group">
            <label for="themeSelect">Theme</label>
            <select id="themeSelect">
                <option value="light">Light (White)</option>
                <option value="dark">Dark (Black)</option>
            </select>
        </div>

        <h3>Content Padding (px)</h3>
        <div class="control-row">
            <div class="control-group">
                <label>Top</label>
                <input type="number" id="paddingTop" value="40" min="0">
            </div>
            <div class="control-group">
                <label>Bottom</label>
                <input type="number" id="paddingBottom" value="40" min="0">
            </div>
        </div>
        <div class="control-row">
            <div class="control-group">
                <label>Left</label>
                <input type="number" id="paddingLeft" value="40" min="0">
            </div>
            <div class="control-group">
                <label>Right</label>
                <input type="number" id="paddingRight" value="40" min="0">
            </div>
        </div>

        <div style="flex:1"></div> <!-- Spacer -->

        <button class="primary" id="printBtn">🖨️ Print / Save PDF</button>
        <button class="secondary" id="closeBtn">Close</button>
    </div>

    <!-- Content Preview -->
    <div id="preview-container">
        <!-- THE PAPER -->
        <div id="page-sheet">
            <!-- THE CONTENT -->
            <div id="editor-print-container">
                <p style="color: grey; text-align: center; margin-top: 50%;">Loading content...</p>
            </div>
        </div>
    </div>

    <!-- LOGIC -->
    <script src="utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const content = localStorage.getItem('mindjournal_print_content');
            const pageSheet = document.getElementById('page-sheet');
            const editorContainer = document.getElementById('editor-print-container');

            const sizeSelect = document.getElementById('sizeSelect');
            const themeSelect = document.getElementById('themeSelect');
            const printBtn = document.getElementById('printBtn');
            const closeBtn = document.getElementById('closeBtn');
            const styleInjection = document.getElementById('page-style-injection');

            // Padding Inputs (px)
            const paddingInputs = {
                top: document.getElementById('paddingTop'),
                bottom: document.getElementById('paddingBottom'),
                left: document.getElementById('paddingLeft'),
                right: document.getElementById('paddingRight')
            };

            // 1. Load Content
            const title = localStorage.getItem('mindjournal_print_title') || 'Untitled Document';

            if (content) {
                // Inject title as H1 at the beginning
                editorContainer.innerHTML = `<h1>${escapeHtml(title)}</h1>` + content;
                // Update window title
                document.title = `Print Preview - ${title}`;
            } else {
                editorContainer.innerHTML = '<h1 style="color:red">Error: No content found to print.</h1><p>Please go back and try exporting again.</p>';
            }


            // 2. CSS Injector Function for Margins (@page)
            function updatePageSize() {
                const size = sizeSelect.value;
                let pageRule = '';

                if (size === 'size-infinity') {
                    // TRUE INFINITY MODE logic
                    const contentHeightPx = pageSheet.scrollHeight;
                    const heightMm = Math.ceil(contentHeightPx * 0.264583) + 20;
                    // Force margin 0 to let padding handle spacing
                    pageRule = `@page { size: 210mm ${heightMm}mm; margin: 0; }`;
                } else {
                    const sizeName = size.replace('size-', '');
                    pageRule = `@page { size: ${sizeName}; margin: 0; }`;
                }
                styleInjection.textContent = pageRule;
            }

            // 3. Padding Update Function (Pixel-based, Real-time)
            function updateContentPadding() {
                let pt = parseInt(paddingInputs.top.value) || 0;
                let pb = parseInt(paddingInputs.bottom.value) || 0;
                let pl = parseInt(paddingInputs.left.value) || 0;
                let pr = parseInt(paddingInputs.right.value) || 0;

                pt = Math.max(0, pt); pb = Math.max(0, pb); pl = Math.max(0, pl); pr = Math.max(0, pr);

                editorContainer.style.paddingTop = `${pt}px`;
                editorContainer.style.paddingBottom = `${pb}px`;
                editorContainer.style.paddingLeft = `${pl}px`;
                editorContainer.style.paddingRight = `${pr}px`;
            }

            // 4. Setup Listeners
            sizeSelect.addEventListener('change', (e) => {
                document.body.className = e.target.value;
                updatePageSize();
            });

            themeSelect.addEventListener('change', (e) => {
                const theme = e.target.value;
                document.documentElement.setAttribute('data-theme', theme);
            });

            Object.values(paddingInputs).forEach(input => {
                input.addEventListener('input', updateContentPadding);
            });

            // 5. Print Action
            printBtn.addEventListener('click', () => {
                if (sizeSelect.value === 'size-infinity') {
                    updatePageSize();
                }
                window.print();
            });

            // 6. Close Action
            closeBtn.addEventListener('click', () => {
                window.close();
            });

            // Init
            updatePageSize();
            updateContentPadding();
        });
    </script>
</body>

</html>
