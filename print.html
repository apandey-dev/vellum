<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vellum - Print</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        body { font-family: 'Fredoka', sans-serif; padding: 40px; color: black; line-height: 1.6; }
        .note-title { font-size: 32px; font-weight: 700; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .markdown-body h1, .markdown-body h2 { border-bottom: 1px solid #eee; padding-bottom: 0.3em; }
        pre { background: #f6f8fa; padding: 16px; border-radius: 8px; overflow: auto; }
        @media print { body { padding: 0; } .no-print { display: none; } }
    </style>
</head>
<body>
    <div id="print-area">
        <h1 class="note-title" id="title"></h1>
        <div id="content" class="markdown-body"></div>
    </div>
    <script type="module">
        import { MarkdownEngine } from '/js/markdown-engine.js';
        const title = localStorage.getItem('vellum_print_title') || 'Untitled Note';
        const content = localStorage.getItem('vellum_print_content') || '';
        document.getElementById('title').textContent = title;
        document.getElementById('content').innerHTML = MarkdownEngine.render(content);
        window.print();
    </script>
</body>
</html>
