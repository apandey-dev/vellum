<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vellum - Shared Note</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&family=Kalam:wght@300;400;700&family=Playpen+Sans:wght@100;200;300;400;500;600;700;800&family=Patrick+Hand&family=Baloo+2:wght@400;500;600;700;800&family=Comic+Neue:wght@300;400;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="/js/route-guard.js"></script>

    <style>
        /* Shared variables from styles.css for consistency */
        :root {
            /* Light Mode Default */
            --bg-canvas: #f2f4f7;
            --bg-panel: #ffffff;
            --text-primary: #101828;
            --text-secondary: #667085;
            --border-color: #eaecf0;
            --accent-color: #000000;
            --grid-color: #e4e7ec;

            /* Colors matching editor */
            --color-red: #ef4444;
            --color-blue: #3b82f6;
            --color-green: #10b981;
            --color-yellow: #f59e0b;
            --color-purple: #8b5cf6;
            --color-pink: #ec4899;
        }

        [data-theme="dark"] {
            --bg-canvas: #09090b;
            --bg-panel: #141415;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --border-color: #2a2a2a;
            --accent-color: #3b82f6;
            --grid-color: #1f1f22;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-canvas);
            color: var(--text-primary);
            font-family: 'Fredoka', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Top Bar */
        .share-header {
            height: 70px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .brand {
            font-weight: 700;
            font-size: 20px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .action-btn {
            height: 40px;
            padding: 0 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-primary);
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background-color: var(--border-color);
        }

        .action-btn.primary {
            background-color: var(--text-primary);
            color: var(--bg-canvas);
            border-color: var(--text-primary);
        }

        .theme-btn {
            width: 40px;
            padding: 0;
            justify-content: center;
        }

        /* Main Content */
        .content-wrapper {
            margin-top: 100px;
            margin-bottom: 60px;
            display: flex;
            justify-content: center;
            padding: 0 20px;
            width: 100%;
        }

        .paper-container {
            width: 100%;
            max-width: 800px; /* Readable width */
        }

        .note-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 30px;
            line-height: 1.2;
        }

        .note-content {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 50px;
            min-height: 500px;
            font-size: 18px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        .note-content * {
            max-width: 100%;
        }

        /* Error/Loading State */
        .state-msg {
            text-align: center;
            margin-top: 100px;
            font-size: 20px;
            color: var(--text-secondary);
        }


        /* --- PRINT STYLES (Infinite Page) --- */
        @media print {
            /* Hide UI */
            .share-header, .header-actions {
                display: none !important;
            }

            /* Main Layout Reset */
            html, body {
                margin: 0;
                padding: 0;
                background: white !important;
                color: black !important;
                height: auto;
                min-height: 100vh;
                overflow: visible;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                width: 100%;
            }

            .content-wrapper {
                margin: 0;
                padding: 0;
                display: block;
                width: 100%;
                max-width: none;
            }

            .paper-container {
                width: 100%;
                max-width: none;
                margin: 0;
                box-shadow: none;
            }

            .note-title {
                padding: 20px 40px 0 40px; /* Padding for print */
                margin-bottom: 20px;
                color: black !important;
            }

            .note-content {
                border: none;
                border-radius: 0;
                box-shadow: none;
                padding: 0 40px 40px 40px; /* Padding for print */
                min-height: 0;
                background: white !important;
                color: black !important;
            }

            /* Infinite Page Logic injected by JS via @page */
        }
    </style>
    <!-- Placeholder for dynamic print styles -->
    <style id="dynamic-print-style"></style>
</head>

<body>

    <header class="share-header">
        <div class="header-left">
            <div class="brand">Vellum</div>
        </div>
        <div class="header-actions">
            <button class="action-btn theme-btn" id="themeToggle" title="Toggle Theme">
                <i class="ph ph-sun"></i>
            </button>
            <button class="action-btn primary" id="printBtn">
                <i class="ph ph-printer"></i> Print / PDF
            </button>
        </div>
    </header>

    <div id="app" class="content-wrapper"><div class="state-msg">Loading note...</div></div>

    <template id="noteTemplate">
        <div class="paper-container">
            <h1 class="note-title" id="displayTitle">Untitled Note</h1>
            <div class="note-content" id="displayContent"></div>
        </div>
    </template>

    <script type="module">
        import { supabase } from '/js/supabase-client.js';

        const template = document.getElementById('noteTemplate');
        const app = document.getElementById('app');
        const themeToggle = document.getElementById('themeToggle');
        const printBtn = document.getElementById('printBtn');
        const html = document.documentElement;
        const dynamicStyle = document.getElementById('dynamic-print-style');

        // 1. Theme Logic
        function toggleTheme() {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);

            const icon = themeToggle.querySelector('i');
            if (next === 'dark') {
                icon.className = 'ph ph-moon';
            } else {
                icon.className = 'ph ph-sun';
            }
        }
        themeToggle.addEventListener('click', toggleTheme);

        // 2. Load Note
        async function loadNote() {
            const pathParts = window.location.pathname.split('/');
            // Expected path /share/ID
            const publicId = pathParts[pathParts.length - 1];

            if (!publicId || publicId === 'share') {
                app.innerHTML = '<div class="state-msg">No note ID specified.</div>';
                return;
            }

            try {
                // Call the RPC function
                const { data, error } = await supabase.rpc('get_public_note', { p_public_id: publicId });

                if (error || !data || data.length === 0) {
                    app.innerHTML = '<div class="state-msg">This link has expired or is no longer available.</div>';
                    return;
                }

                const note = data[0];

                // Render
                app.innerHTML = '';
                const clone = template.content.cloneNode(true);

                clone.getElementById('displayTitle').textContent = note.title;
                clone.getElementById('displayContent').textContent = note.content;

                app.appendChild(clone);

            } catch (e) {
                console.error(e);
                app.innerHTML = '<div class="state-msg">Error loading note.</div>';
            }
        }

        // 3. Smart "Infinity" Print
        printBtn.addEventListener('click', () => {
            const bodyHeight = document.body.scrollHeight;
            const heightMm = Math.ceil(bodyHeight * 0.264583) + 20;
            dynamicStyle.textContent = `@page { size: 210mm ${heightMm}mm; margin: 0; }`;
            window.print();
        });

        // Initialize
        loadNote();

        // Theme init
        const savedTheme = localStorage.getItem('vellum_theme') || 'light';
        html.setAttribute('data-theme', savedTheme);
        const icon = themeToggle.querySelector('i');
        if (savedTheme === 'dark') {
            icon.className = 'ph ph-moon';
        } else {
            icon.className = 'ph ph-sun';
        }

    </script>
</body>

</html>
