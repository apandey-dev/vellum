<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vellum - Shared Note</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&family=Kalam:wght@300;400;700&family=Playpen+Sans:wght@100;200;300;400;500;600;700;800&family=Patrick+Hand&family=Baloo+2:wght@400;500;600;700;800&family=Comic+Neue:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-light">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-dark" disabled>

    <script src="/js/route-guard.js"></script>
    <style>
        :root { --bg-canvas: #f2f4f7; --bg-panel: #ffffff; --text-primary: #101828; --text-secondary: #667085; --border-color: #eaecf0; --accent-color: #000000; }
        [data-theme="dark"] { --bg-canvas: #09090b; --bg-panel: #141415; --text-primary: #ffffff; --text-secondary: #888888; --border-color: #2a2a2a; --accent-color: #3b82f6; }
        body { background-color: var(--bg-canvas); color: var(--text-primary); font-family: 'Fredoka', sans-serif; display: flex; flex-direction: column; min-height: 100vh; margin: 0; }
        .share-header { height: 70px; background: var(--bg-panel); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; position: fixed; top: 0; left: 0; right: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); }
        .brand { font-weight: 700; font-size: 20px; }
        .action-btn { height: 40px; padding: 0 16px; border-radius: 8px; border: 1px solid var(--border-color); background: transparent; color: var(--text-primary); font-family: inherit; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .action-btn.primary { background-color: var(--text-primary); color: var(--bg-canvas); border-color: var(--text-primary); }
        .content-wrapper { margin-top: 100px; margin-bottom: 60px; display: flex; justify-content: center; padding: 0 20px; }
        .paper-container { width: 100%; max-width: 800px; }
        .note-title { font-size: 36px; font-weight: 700; margin-bottom: 30px; line-height: 1.2; }
        .note-content { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 16px; padding: 50px; min-height: 500px; font-size: 18px; line-height: 1.6; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05); }
        .state-msg { text-align: center; margin-top: 100px; font-size: 20px; color: var(--text-secondary); }
        @media print { .share-header { display: none !important; } .content-wrapper { margin: 0; padding: 0; } .note-content { border: none; box-shadow: none; padding: 0; } }
    </style>
</head>
<body>
    <header class="share-header">
        <div class="brand">Vellum</div>
        <div class="header-actions">
            <button class="action-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
            <button class="action-btn primary" id="printBtn"><i class="fas fa-print"></i> Print / PDF</button>
        </div>
    </header>
    <div id="app" class="content-wrapper"><div class="state-msg">Loading note...</div></div>

    <script type="module">
        import { supabase } from '/js/supabase-client.js';
        import { MarkdownEngine } from '/js/markdown-engine.js';

        async function loadNote() {
            const pathParts = window.location.pathname.split('/');
            const publicId = pathParts[pathParts.length - 1];
            if (!publicId || publicId === 'share') {
                document.getElementById('app').innerHTML = '<div class="state-msg">No note ID specified.</div>';
                return;
            }
            try {
                const { data, error } = await supabase.rpc('get_public_note', { p_share_token: publicId });
                if (error || !data || data.length === 0) {
                    document.getElementById('app').innerHTML = '<div class="state-msg">This link has expired or is no longer available.</div>';
                    return;
                }
                const note = data[0];
                document.getElementById('app').innerHTML = `
                    <div class="paper-container">
                        <h1 class="note-title">${note.title}</h1>
                        <div class="note-content markdown-body">${MarkdownEngine.render(note.content)}</div>
                    </div>`;
            } catch (e) {
                document.getElementById('app').innerHTML = '<div class="state-msg">Error loading note.</div>';
            }
        }

        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        function updateTheme(theme) {
            html.setAttribute('data-theme', theme);
            themeToggle.querySelector('i').className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            document.getElementById('hljs-light').disabled = (theme === 'dark');
            document.getElementById('hljs-dark').disabled = (theme === 'light');
            localStorage.setItem('vellum_theme', theme);
        }
        themeToggle.addEventListener('click', () => updateTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));
        document.getElementById('printBtn').addEventListener('click', () => window.print());

        updateTheme(localStorage.getItem('vellum_theme') || 'light');
        loadNote();
    </script>
</body>
</html>
